<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário de Comunicação - Igreja</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="styles.css?v=1.8">
    
    <!-- Biblioteca html2canvas para exportação PNG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <!-- ==========================================
         CABEÇALHO MINIMALISTA
         ========================================== -->
    <header class="header">
        <div class="header-content">
            <h1><i class="fas fa-calendar-alt"></i> Calendário de Comunicação</h1>
        </div>
    </header>

    <!-- ==========================================
         CONTAINER PRINCIPAL
         ========================================== -->
    <main class="main-container">
        <!-- Layout em duas colunas -->
        <div class="layout-grid">
            
            <!-- ==========================================
                 COLUNA ESQUERDA - FORMULÁRIO
                 ========================================== -->
            <aside class="sidebar">
                <div class="card card-form">
                    <div class="card-header" id="formHeader">
                        <h2><i class="fas fa-plus-circle"></i> Novo Evento</h2>
                        <button type="button" class="btn-icon" id="btnToggleForm" title="Expandir/Recolher">
                            <i class="fas fa-chevron-up"></i>
                        </button>
                    </div>
                    
                    <form id="formEvento" class="form-evento">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="titulo">
                                    <i class="fas fa-tag"></i> Título
                                </label>
                                <input 
                                    type="text" 
                                    id="titulo" 
                                    name="titulo" 
                                    placeholder="Nome do evento"
                                    required
                                >
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="data">
                                    <i class="fas fa-calendar"></i> Início
                                </label>
                                <input 
                                    type="date" 
                                    id="data" 
                                    name="data" 
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="data_fim">
                                    <i class="fas fa-calendar-check"></i> Término <span class="label-optional">(opcional)</span>
                                </label>
                                <input 
                                    type="date" 
                                    id="data_fim" 
                                    name="data_fim"
                                >
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="departamento">
                                    <i class="fas fa-layer-group"></i> Departamento
                                </label>
                                <select id="departamento" name="departamento" required>
                                    <option value="">Selecione...</option>
                                    <option value="Louvor">🎵 Louvor</option>
                                    <option value="Jovens">👥 Jovens</option>
                                    <option value="Infantil">🧒 Infantil</option>
                                    <option value="Administrativo">💼 Administrativo</option>
                                    <option value="Missões">🌍 Missões</option>
                                    <option value="Casais">💕 Casais</option>
                                    <option value="Mulheres">👩 Mulheres</option>
                                    <option value="Homens">👨 Homens</option>
                                    <option value="Diaconia">🤝 Diaconia</option>
                                    <option value="Ensino">📖 Ensino</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="responsavel">
                                    <i class="fas fa-user"></i> Responsável
                                </label>
                                <input 
                                    type="text" 
                                    id="responsavel" 
                                    name="responsavel" 
                                    placeholder="Nome do responsável"
                                    required
                                >
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="descricao">
                                    <i class="fas fa-align-left"></i> Descrição <span class="label-optional">(opcional)</span>
                                </label>
                                <textarea 
                                    id="descricao" 
                                    name="descricao" 
                                    placeholder="Detalhes do evento..."
                                    rows="2"
                                ></textarea>
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="btnSalvar">
                                <i class="fas fa-check"></i> Salvar
                            </button>
                            <button type="button" class="btn btn-ghost" id="btnLimpar">
                                <i class="fas fa-times"></i> Limpar
                            </button>
                        </div>
                        
                        <input type="hidden" id="eventoId" value="">
                    </form>
                </div>
                
                <!-- Legenda dos Departamentos -->
                <div class="card card-legend">
                    <h3><i class="fas fa-palette"></i> Departamentos</h3>
                    <div class="legend-grid">
                        <span class="legend-item dept-louvor"><i class="fas fa-music"></i> Louvor</span>
                        <span class="legend-item dept-jovens"><i class="fas fa-users"></i> Jovens</span>
                        <span class="legend-item dept-infantil"><i class="fas fa-child"></i> Infantil</span>
                        <span class="legend-item dept-administrativo"><i class="fas fa-briefcase"></i> Admin</span>
                        <span class="legend-item dept-missoes"><i class="fas fa-globe"></i> Missões</span>
                        <span class="legend-item dept-casais"><i class="fas fa-heart"></i> Casais</span>
                        <span class="legend-item dept-mulheres"><i class="fas fa-female"></i> Mulheres</span>
                        <span class="legend-item dept-homens"><i class="fas fa-male"></i> Homens</span>
                        <span class="legend-item dept-diaconia"><i class="fas fa-hands-helping"></i> Diaconia</span>
                        <span class="legend-item dept-ensino"><i class="fas fa-book"></i> Ensino</span>
                    </div>
                </div>
            </aside>

            <!-- ==========================================
                 COLUNA DIREITA - CALENDÁRIO
                 ========================================== -->
            <section class="calendar-section">
                <!-- Navegação do Calendário -->
                <div class="calendar-nav">
                    <div class="nav-controls">
                        <button class="btn btn-nav" id="btnAnoAnterior" title="Ano anterior">
                            <i class="fas fa-angle-double-left"></i>
                        </button>
                        <button class="btn btn-nav" id="btnMesAnterior" title="Mês anterior">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                    </div>
                    
                    <div class="nav-title">
                        <span class="nav-month" id="labelMes">Fevereiro</span>
                        <span class="nav-year" id="labelAno">2026</span>
                    </div>
                    
                    <div class="nav-controls">
                        <button class="btn btn-nav" id="btnMesProximo" title="Próximo mês">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                        <button class="btn btn-nav" id="btnAnoProximo" title="Próximo ano">
                            <i class="fas fa-angle-double-right"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Ações Rápidas -->
                <div class="calendar-actions">
                    <div class="month-pills">
                        <button class="pill" data-month="0">Jan</button>
                        <button class="pill" data-month="1">Fev</button>
                        <button class="pill" data-month="2">Mar</button>
                        <button class="pill" data-month="3">Abr</button>
                        <button class="pill" data-month="4">Mai</button>
                        <button class="pill" data-month="5">Jun</button>
                        <button class="pill" data-month="6">Jul</button>
                        <button class="pill" data-month="7">Ago</button>
                        <button class="pill" data-month="8">Set</button>
                        <button class="pill" data-month="9">Out</button>
                        <button class="pill" data-month="10">Nov</button>
                        <button class="pill" data-month="11">Dez</button>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-outline" id="btnHoje">
                            <i class="fas fa-calendar-day"></i> Hoje
                        </button>
                        <button class="btn btn-success" id="btnExportar">
                            <i class="fas fa-download"></i> Exportar
                        </button>
                    </div>
                </div>
                
                <!-- Container do Calendário -->
                <div id="calendarioContainer" class="calendario-container">
                    <div class="calendario-header-export">
                        <h3 id="tituloCalendarioExport">Fevereiro 2026</h3>
                        <p>Calendário de Eventos da Igreja</p>
                    </div>
                    
                    <div class="calendario">
                        <div class="calendario-header">
                            <div class="dia-semana dom">Domingo</div>
                            <div class="dia-semana">Segunda</div>
                            <div class="dia-semana">Terça</div>
                            <div class="dia-semana">Quarta</div>
                            <div class="dia-semana">Quinta</div>
                            <div class="dia-semana">Sexta</div>
                            <div class="dia-semana sab">Sábado</div>
                        </div>
                        
                        <div class="calendario-grid" id="calendarioGrid">
                            <!-- Dias serão inseridos aqui dinamicamente -->
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- ==========================================
         MODAL DE DETALHES DO DIA
         ========================================== -->
    <div id="modalDia" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitulo"><i class="fas fa-calendar-day"></i> Eventos do Dia</h3>
                <button class="btn-icon modal-close" id="btnFecharModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Conteúdo dos eventos será inserido aqui -->
            </div>
        </div>
    </div>

    <!-- ==========================================
         NOTIFICAÇÕES/TOAST
         ========================================== -->
    <div id="toast" class="toast">
        <i class="toast-icon"></i>
        <span id="toastMensagem"></span>
    </div>

    <!-- JavaScript Principal -->
    <script type="module" src="app.js"></script>
</body>
</html>
